version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - echo "FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID" >> .env.production.local
        - echo "FIREBASE_CLIENT_EMAIL=$FIREBASE_CLIENT_EMAIL" >> .env.production.local
        - echo "FIREBASE_STORAGE_BUCKET=$FIREBASE_STORAGE_BUCKET" >> .env.production.local
        - echo "NEWSLETTERS_API_KEY=$NEWSLETTERS_API_KEY" >> .env.production.local
        - printf "FIREBASE_PRIVATE_KEY=%s" "$FIREBASE_PRIVATE_KEY" >> .env.production.local
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
